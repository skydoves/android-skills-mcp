name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write      # create GitHub Release
  id-token: write      # npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone android/skills (pinned to .skills-commit)
        # Build and publish against the exact upstream revision this release was
        # cut from, so the packaged skills and snapshot tests are reproducible.
        run: |
          SHA=$(cat .skills-commit)
          git init -q skills
          git -C skills remote add origin https://github.com/android/skills.git
          git -C skills fetch -q --depth=1 origin "$SHA"
          git -C skills checkout -q --detach FETCH_HEAD

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test

      - name: Strip workspace devDep from published package.json
        # @android-skills/core is a workspace-only package that gets inlined via
        # tsup noExternal. Keeping it in devDependencies of the published
        # package.json confuses anyone extracting the tarball ("npm install"
        # errors on workspace:* URLs). Remove it only for publishing.
        run: |
          node -e "
          const fs = require('node:fs');
          for (const p of ['packages/mcp/package.json', 'packages/pack/package.json']) {
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (pkg.devDependencies) delete pkg.devDependencies['@android-skills/core'];
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          }
          "

      - name: Publish android-skills-mcp
        working-directory: packages/mcp
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish android-skills-pack
        working-directory: packages/pack
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
